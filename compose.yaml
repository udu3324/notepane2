services:
  website:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - '3000:3000'
  
  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  db_backup: # https://github.com/sa8ab/xmrchat/blob/aa70d654b60e056c062bb1e8a70f4e107efcf368/server/docker-compose.yml
    image: postgres:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL}
    volumes:
      - ./backups:/backups
    command: |-
      sh -c '
      mkdir -p /backups
      while true; do
        sleep 10
        echo "Running backup"
        PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB > /backups/backup-$$(date +%Y%m%d%H%M%S).sql
        echo "Backup done, sleeping"
        sleep $$BACKUP_INTERVAL
      done
      '

volumes:
  postgres_data:
